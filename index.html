function getOptimizedCloudinaryUrl(url, width = 300) {
  if (!url) return 'https://via.placeholder.com/150';
  if (!url.includes('cloudinary.com')) return url;
  const parts = url.split('/upload/');
  if (parts.length < 2) return url;

// === SAUVEGARDE PANIER ===
function saveCartDraft() {
  if (!currentRes) return;
  try {
    localStorage.setItem('koul_cart_draft', JSON.stringify({ cart, resId: currentRes.id }));
  } catch(e) {}
}
function clearCartDraft() {
  localStorage.removeItem('koul_cart_draft');
}
function restoreCartDraft() {
  if (restoredFromDraft) return;
  try {
    const raw = localStorage.getItem('koul_cart_draft');
    if (!raw) return;
    const draft = JSON.parse(raw);
    if (!draft.cart || Object.keys(draft.cart).length === 0) { localStorage.removeItem('koul_cart_draft'); return; }
    const r = restaurants.find(res => Number(res.id) === Number(draft.resId));
    if (!r) { localStorage.removeItem('koul_cart_draft'); return; }
    let valid = true;
    for (let pid in draft.cart) {
      if (!r.plats.find(p => Number(p.id) === Number(pid))) { valid = false; break; }
    }
    if (!valid) { localStorage.removeItem('koul_cart_draft'); return; }
    cart = draft.cart;
    currentRes = r;
    showSection('view-menu-client');
    document.getElementById('client-res-name').innerText = `${r.name} (⭐ ${calcAvg(r.ratings)})`;
    renderClientPlats();
    updateCartUI();
    restoredFromDraft = true;
    setNotif("🔄 Panier restauré");
  } catch(e) { localStorage.removeItem('koul_cart_draft'); }
}

function isRestaurantAvailable(r) {
  if (r.expiry && Date.now() > r.expiry) return false;
  if (!r.plats || r.plats.length === 0) return false;
  if (r.plats.every(p => p.stock === 0)) return false;
  return true;
}

// === FONCTIONS UTILITAIRES ===
function calcAvg(arr) { if (!arr || arr.length===0) return "N/A"; const s = arr.reduce((a,b)=>a+b,0); return (s/arr.length).toFixed(1); }
function resIndex(resId) { return restaurants.findIndex(r => Number(r.id)===Number(resId)); }
function vibrate(ms=50) { if (navigator.vibrate) navigator.vibrate(ms); }

function setNotif(msg) {
  vibrate(100);
  const bar = document.getElementById('notification-bar');
  document.getElementById('notif-message').innerText = msg;
  bar.style.backgroundColor = "#ffcc00"; bar.style.color = "#000";
  setTimeout(() => { bar.style.backgroundColor = "#000"; bar.style.color = "#ffcc00"; document.getElementById('notif-message').innerText = promoMessage; }, 3000);
}

function showSection(id) {
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// === AUTRES FONCTIONS (inchangées) ===
function getCurrentPosition(latInputId, lngInputId) {
  if (!navigator.geolocation) { setNotif("Géolocalisation non supportée"); return; }
  setNotif("📡 Récupération de la position...");
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById(latInputId).value = pos.coords.latitude.toFixed(6);
      document.getElementById(lngInputId).value = pos.coords.longitude.toFixed(6);
      setNotif("✅ Position récupérée");
    },
    () => setNotif("❌ Échec de la géolocalisation"),
    { timeout: 10000, enableHighAccuracy: true }
  );
}

function uploadToCloudinary(file, callback) {
  if (!file) { callback(null); return; }
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  setNotif("📸 Upload de l'image en cours...");
  fetch(CLOUDINARY_UPLOAD_URL, {
    method: 'POST',
    body: formData
  })
  .then(res => { if (!res.ok) throw new Error('Erreur HTTP ' + res.status); return res.json(); })
  .then(data => {
    if (data.secure_url) {
      console.log('✅ Cloudinary URL :', data.secure_url);
      setNotif("✅ Image uploadée avec succès");
      callback(data.secure_url);
    } else { throw new Error('Réponse Cloudinary invalide'); }
  })
  .catch(err => {
    console.error('Cloudinary upload error:', err);
    setNotif("⚠️ Échec de l'upload de l'image (utilisation sans image)");
    callback(null);
  });
}

function enqueueCloudWrite(task) { cloudWriteChain = cloudWriteChain.then(task).catch(console.error); return cloudWriteChain; }
function pushRestaurants() { return enqueueCloudWrite(() => db.ref('cloud_koul/restaurants').set(restaurants)); }
function saveRestaurant(res) { const i = resIndex(res.id); if (i<0) return cloudWriteChain; restaurants[i]=res; return enqueueCloudWrite(() => db.ref(`cloud_koul/restaurants/${i}`).set(res)); }
function pushLivreurs() { return enqueueCloudWrite(() => db.ref('cloud_koul/livreurs').set(livreurs)); }
function saveLivreur(liv) { const i = livreurs.findIndex(l => Number(l.id)===Number(liv.id)); if (i<0) return cloudWriteChain; livreurs[i]=liv; return enqueueCloudWrite(() => db.ref(`cloud_koul/livreurs/${i}`).set(liv)); }
function pushHistory() { return enqueueCloudWrite(() => db.ref('cloud_koul/adminHistory').set(adminHistory)); }
function pushPromo() { return enqueueCloudWrite(() => db.ref('cloud_koul/promoMessage').set(promoMessage)); }
function pushAppLogos() { return enqueueCloudWrite(() => db.ref('cloud_koul/appLogos').set(appLogos)); }
function pushActiveLogo(url) { return enqueueCloudWrite(() => db.ref('cloud_koul/activeLogo').set(url)); }

function logAdminEvent(type, details) {
  const now = new Date();
  adminHistory.unshift({ type, details, time: String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), date: now.toLocaleDateString() });
  setTimeout(pushHistory, 50);
}
function logResEvent(res, status, order) {
  if (!res.eventHistory) res.eventHistory = [];
  const now = new Date();
  const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  res.eventHistory.unshift({ status, client: order.client, items: order.itemsText || (order.items ? order.items.join(', ') : ''), time: timeStr, date: now.toLocaleDateString() });
  logAdminEvent(res.name.toUpperCase(), `${status} - Client: ${order.client}`);
  saveRestaurant(res);
}

// === LISTENERS FIREBASE ===
function bindCloudListeners() {
  db.ref('cloud_koul/restaurants').on('value', snap => {
    const data = snap.val();
    restaurants = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    onRestaurantsUpdated();
  });
  db.ref('cloud_koul/livreurs').on('value', snap => {
    const data = snap.val();
    livreurs = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    onLivreursUpdated();
  });
  db.ref('cloud_koul/adminHistory').on('value', snap => {
    const data = snap.val();
    adminHistory = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    if (document.getElementById('view-admin-space').classList.contains('active')) renderAdminHistory();
  });
  db.ref('cloud_koul/promoMessage').on('value', snap => {
    promoMessage = snap.val() || 'BIENVENUE';
    document.getElementById('notif-message').innerText = promoMessage;
  });
  db.ref('cloud_koul/appLogos').on('value', snap => {
    const data = snap.val();
    appLogos = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    if (document.getElementById('view-admin-space').classList.contains('active')) renderLogoGallery();
  });
  db.ref('cloud_koul/activeLogo').on('value', snap => {
    const data = snap.val();
    activeLogo = data || null;
    updateHeaderLogo();
    if (document.getElementById('view-admin-space').classList.contains('active')) renderLogoGallery();
  });
}

function onRestaurantsUpdated() {
  document.getElementById('loading-screen').style.display = 'none';
  if (currentRes) {
    const updated = restaurants.find(r => Number(r.id) === Number(currentRes.id));
    if (updated) currentRes = updated;
  }
  if (!restoredFromDraft && restaurants.length > 0) {
    restoreCartDraft();
  }
  if (currentRes && cart && Object.keys(cart).length > 0) {
    let needRefresh = false;
    for (let pid in cart) {
      const plat = currentRes.plats.find(p => Number(p.id) === Number(pid));
      if (!plat) { delete cart[pid]; needRefresh = true; continue; }
      if (plat.stock < cart[pid].qte) {
        cart[pid].qte = Math.max(0, plat.stock);
        if (cart[pid].qte === 0) delete cart[pid];
        needRefresh = true;
        setNotif(`⚠️ Stock ajusté pour ${plat.n}`);
      }
    }
    if (needRefresh) {
      renderClientPlats();
      updateCartUI();
      saveCartDraft();
    }
  }
  updateClientOrderStatus();
  refreshCurrentView();
  if (document.getElementById('view-restaurants').classList.contains('active')) init();
}
function onLivreursUpdated() {
  if (currentLivreur) {
    const updated = livreurs.find(l => Number(l.id) === Number(currentLivreur.id));
    if (updated) currentLivreur = updated;
  }
  refreshCurrentView();
}

function refreshCurrentView() {
  if (document.getElementById('view-admin-space').classList.contains('active')) { renderAdminResList(); renderAdminLivList(); renderAdminHistory(); renderLogoGallery(); }
  if (document.getElementById('view-pro-space').classList.contains('active') && currentRes) { renderProOrders(); renderProPlats(); renderResHistory(); }
  if (document.getElementById('view-livreur-space').classList.contains('active') && currentLivreur) { renderLivreurOrders(); renderLivreurHistory(); }
}

// === PRO ===
function startProOrdersWatch(resId) {
  if (stopProOrdersWatch) stopProOrdersWatch();
  const idx = resIndex(resId);
  if (idx < 0) return;
  knownProOrderIds = new Set((currentRes && currentRes.orders ? currentRes.orders : []).map(o => o.id));
  const ordersRef = db.ref(`cloud_koul/restaurants/${idx}/orders`);
  const handler = snap => {
    const orders = snap.val() || [];
    if (!currentRes || Number(currentRes.id) !== Number(resId)) return;
    const newOnes = orders.filter(o => o && o.status === 'new' && !knownProOrderIds.has(o.id));
    orders.forEach(o => { if (o && o.id) knownProOrderIds.add(o.id); });
    currentRes.orders = orders;
    if (document.getElementById('view-pro-space').classList.contains('active')) { renderProOrders(); if (newOnes.length>0) { vibrate([100,50,100]); setNotif('NOUVELLE COMMANDE !'); } }
  };
  ordersRef.on('value', handler);
  stopProOrdersWatch = () => ordersRef.off('value', handler);
}

function updateRestaurantOrders(resId, mutatorFn) {
  const idx = resIndex(resId);
  if (idx === -1) {
    console.error("Restaurant not found for id:", resId);
    return Promise.reject(new Error("Restaurant not found"));
  }
  const ref = db.ref(`cloud_koul/restaurants/${idx}/orders`);
  return ref.transaction(currentOrders => {
    const orders = currentOrders || [];
    const newOrders = mutatorFn(orders);
    if (newOrders === undefined) return undefined;
    return newOrders;
  });
}

// === CLIENT ===
function confirmClientOrder() {
  if (clientTempPin.length < 4) return;
  const okBtn = document.getElementById('client-ok-btn');
  if (okBtn) okBtn.disabled = true;
  const clientName = document.getElementById('c-name').value.trim();
  const clientTel = document.getElementById('c-tel').value.trim();
  const clientAddress = document.getElementById('c-address').value.trim();
  if (!clientName) { setNotif("NOM REQUIS"); if (okBtn) okBtn.disabled = false; return; }

  const itemsArray = Object.values(cart);
  if (itemsArray.length === 0) { setNotif("PANIER VIDE"); if (okBtn) okBtn.disabled = false; return; }

  const restIdx = resIndex(currentRes.id);
  if (restIdx === -1) { setNotif("RESTAURANT INTROUVABLE"); if (okBtn) okBtn.disabled = false; return; }

  const stockUpdates = itemsArray.map(item => {
    const platIdx = currentRes.plats.findIndex(p => Number(p.id) === Number(item.id));
    if (platIdx === -1) return null;
    return {
      ref: db.ref(`cloud_koul/restaurants/${restIdx}/plats/${platIdx}/stock`),
      platName: item.n,
      platId: item.id,
      qty: item.qte,
      platIdx: platIdx
    };
  }).filter(x => x !== null);

  if (stockUpdates.length === 0) { setNotif("PROBLÈME DE PLATS"); if (okBtn) okBtn.disabled = false; return; }

  const transactionPromises = stockUpdates.map(update => {
    return new Promise((resolve, reject) => {
      update.ref.transaction((currentStock) => {
        if (currentStock === null || currentStock < update.qty) { return undefined; }
        return currentStock - update.qty;
      }, (error, committed, snapshot) => {
        if (error || !committed) { reject({ error, update }); } else { resolve({ update, newStock: snapshot.val() }); }
      }, false);
    });
  });

  Promise.allSettled(transactionPromises)
    .then(async (results) => {
      const failures = results.filter(r => r.status === 'rejected');
      if (failures.length > 0) {
        const successful = results.filter(r => r.status === 'fulfilled');
        const rollbackPromises = successful.map(r => {
          const { update } = r.value;
          return new Promise((resolveRollback) => {
            update.ref.transaction((current) => {
              if (current === null) return undefined;
              return current + update.qty;
            }, (err, committed, snap) => { resolveRollback(); }, false);
          });
        });
        await Promise.all(rollbackPromises);
        const failedNames = failures.map(f => f.reason.update.platName);
        setNotif("⚠️ Stock insuffisant pour : " + failedNames.join(', '));
        if (okBtn) okBtn.disabled = false;
        return;
      }

      const total = itemsArray.reduce((sum, item) => sum + item.p * item.qte, 0);
      const orderId = Date.now();
      const order = {
        id: orderId,
        client: clientName,
        tel: clientTel,
        rawItems: itemsArray,
        itemsText: itemsArray.map(i => `${i.qte}x ${i.n}`).join(', '),
        total: total,
        pin: clientTempPin,
        status: 'new',
        clientLat: null,
        clientLng: null,
        clientAddress: clientAddress,
        mode: orderMode
      };

      const positionPromise = new Promise((resolve) => {
        if (orderMode === 'retrait') { resolve({ lat: null, lng: null }); return; }
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            () => resolve({ lat: null, lng: null }),
            { timeout: 8000, enableHighAccuracy: true }
          );
        } else { resolve({ lat: null, lng: null }); }
      });

      const position = await positionPromise;
      if (position.lat != null) {
        order.clientLat = position.lat;
        order.clientLng = position.lng;
      } else if (orderMode === 'livraison' && !clientAddress) {
        const rollbackPromises = stockUpdates.map(update => {
          return new Promise((resolveRollback) => {
            update.ref.transaction((current) => {
              if (current === null) return undefined;
              return current + update.qty;
            }, (err, committed, snap) => { resolveRollback(); }, false);
          });
        });
        await Promise.all(rollbackPromises);
        setNotif("⚠️ Adresse requise (géolocalisation indisponible)");
        document.getElementById('c-address').focus();
        if (okBtn) okBtn.disabled = false;
        return;
      }

      const result = await updateRestaurantOrders(currentRes.id, orders => [...orders, order]);
      if (result.committed) {
        const trackingEntry = { orderId, resId: currentRes.id, pin: clientTempPin, clientName };
        clientOrderTracking.push(trackingEntry);
        localStorage.setItem('koul_client_tracking', JSON.stringify(clientOrderTracking));
        document.getElementById('client-secret-code-display').innerText = "CODE: " + clientTempPin;
        logResEvent(currentRes, "NOUVELLE COMMANDE", order);
        setNotif("COMMANDE RÉUSSIE");
        closeClientPin();
        clearCartDraft();
        showOrderConfirmModal(order);
        if (okBtn) okBtn.disabled = false;
      } else {
        setNotif("ERREUR LORS DE L'ENREGISTREMENT DE LA COMMANDE");
        const rollbackPromises = stockUpdates.map(update => {
          return new Promise((resolveRollback) => {
            update.ref.transaction((current) => {
              if (current === null) return undefined;
              return current + update.qty;
            }, (err, committed, snap) => { resolveRollback(); }, false);
          });
        });
        await Promise.all(rollbackPromises);
        if (okBtn) okBtn.disabled = false;
      }
    })
    .catch(err => {
      console.error("Erreur inattendue lors de la commande:", err);
      setNotif("ERREUR LORS DE LA COMMANDE");
      if (okBtn) okBtn.disabled = false;
    });
}

function showOrderConfirmModal(order) {
  const modal = document.getElementById('order-confirm-modal');
  const overlay = document.getElementById('order-confirm-overlay');
  const content = document.getElementById('confirm-order-content');
  const modeLabel = order.mode === 'retrait' ? '🏠 À emporter' : '🚚 Livraison';
  content.innerHTML = `
    <div class="order-line"><span class="label">Restaurant</span><span class="value">${currentRes.name}</span></div>
    <div class="order-line"><span class="label">Articles</span><span class="value">${order.itemsText}</span></div>
    <div class="order-line"><span class="label">Total</span><span class="value">${Number(order.total).toLocaleString('fr-FR')} DZD</span></div>
    <div class="order-line"><span class="label">Code secret</span><span class="value" style="color:var(--gold);">${order.pin}</span></div>
    <div class="order-line"><span class="label">Mode</span><span class="value">${modeLabel}</span></div>
  `;

  modal.style.display = 'block';

// === SUIVI CLIENTS ===
function loadClientOrderTracking() {
  const saved = localStorage.getItem('koul_client_tracking');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      clientOrderTracking = Array.isArray(parsed) ? parsed : (parsed ? [parsed] : []);
      if (clientOrderTracking.length > 0) document.getElementById('client-secret-code-display').innerText = "CODE: " + clientOrderTracking[0].pin;
    } catch(e) { clientOrderTracking = []; }
  } else { clientOrderTracking = []; }
  const savedRating = localStorage.getItem('koul_rating_queue');
  try { ratingQueue = savedRating ? JSON.parse(savedRating) : []; if (!Array.isArray(ratingQueue)) ratingQueue = []; } catch(e) { ratingQueue = []; }
  updateOrderLed();
}

function clearClientOrderTracking(orderId) {
  clientOrderTracking = clientOrderTracking.filter(entry => entry.orderId !== orderId);
  localStorage.setItem('koul_client_tracking', JSON.stringify(clientOrderTracking));
  if (clientOrderTracking.length === 0) {
    document.getElementById('client-secret-code-display').innerText = '';
    hideOrderStatusBar();
  } else {
    document.getElementById('client-secret-code-display').innerText = "CODE: " + clientOrderTracking[0].pin;
  }
  updateOrderLed();
}

function saveRatingQueue() {
  localStorage.setItem('koul_rating_queue', JSON.stringify(ratingQueue));
}

function processRatingQueue() {
  const modal = document.getElementById('rating-modal');
  if (modal.style.display === 'flex') return;
  if (ratingQueue.length === 0) return;

  const entry = ratingQueue.shift();
  const { resto, order, liv } = entry;
  pendingRatingResto = resto;
  pendingRatingLiv = liv || null;
  pendingOrderForRating = order;
  const counter = document.getElementById('rating-counter');
  counter.textContent = `1/${ratingQueue.length + 1}`;
  openRatingModal(resto, liv || null);
  saveRatingQueue();
}

function updateClientOrderStatus() {
  const trackingCopy = [...clientOrderTracking];
  let foundActive = false;
  let bestStatus = null, bestMode = null, bestOrder = null;

  for (let entry of trackingCopy) {
    const r = restaurants.find(res => Number(res.id) === Number(entry.resId));
    if (!r) { clearClientOrderTracking(entry.orderId); continue; }
    const o = r.orders ? r.orders.find(ord => Number(ord.id) === Number(entry.orderId)) : null;
    if (!o) { clearClientOrderTracking(entry.orderId); continue; }

    if (o.status === 'delivered') {
      const liv = o.livId ? livreurs.find(l => Number(l.id) === Number(o.livId)) : null;
      ratingQueue.push({ resto: r, order: o, liv: liv });
      saveRatingQueue();
      clearClientOrderTracking(entry.orderId);
      continue;
    }

    foundActive = true;
    let priority = 0;
    if (o.status === 'shipping') priority = 3;
    else if (o.status === 'waiting') priority = 2;
    else if (o.status === 'new') priority = 1;
    if (!bestStatus || priority > (bestStatus === 'shipping' ? 3 : bestStatus === 'waiting' ? 2 : 1)) {
      bestStatus = o.status;
      bestMode = o.mode;
      bestOrder = { ...o, resId: r.id };
    }
  }

  if (bestOrder && foundActive) {
    currentBestOrder = bestOrder;
    currentBestStatus = bestStatus;
    currentBestMode = bestMode;
    showOrderStatusBar(bestStatus, bestMode);
  } else {
    currentBestOrder = null;
    currentBestStatus = null;
    currentBestMode = null;
    hideOrderStatusBar();
  }

  processRatingQueue();
  updateOrderLed();
}

function showOrderStatusBar(status, mode) {
  const bar = document.getElementById('order-status-bar');
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  bar.style.display = 'flex';
  if (mode === 'retrait') {
    if (status === 'new') { dot.style.background = '#2196F3'; label.textContent = 'Votre commande est en attente de confirmation'; }
    else if (status === 'waiting') { dot.style.background = '#FF9800'; label.textContent = 'Votre commande est prête, vous pouvez venir la récupérer au restaurant !'; }
  } else {
    if (status === 'new') { dot.style.background = '#2196F3'; label.textContent = 'Votre commande est en attente de confirmation'; }
    else if (status === 'waiting') { dot.style.background = '#FF9800'; label.textContent = 'Votre commande est en préparation'; }
    else if (status === 'shipping') { dot.style.background = '#FFCC00'; label.textContent = 'Votre commande est en livraison'; }
  }
}
function hideOrderStatusBar() { document.getElementById('order-status-bar').style.display = 'none'; }

// === NOTATION ===
function openRatingModal(restaurant, livreur) {
  const modal = document.getElementById('rating-modal');
  modal.style.display = 'flex';
  document.getElementById('rating-resto-name').textContent = restaurant.name;
  document.querySelectorAll('#resto-stars input, #liv-stars input').forEach(input => input.checked = false);
  const livSection = document.getElementById('livreur-rating-section');
  if (livreur) { livSection.style.display = 'block'; document.getElementById('rating-liv-name').textContent = livreur.name; }
  else { livSection.style.display = 'none'; }
}

function submitRatings() {
  const restoStar = document.querySelector('#resto-stars input:checked');
  const livStar = document.querySelector('#liv-stars input:checked');
  if (!restoStar) { setNotif("⚠️ Veuillez noter le restaurant"); return; }
  const restoVal = parseInt(restoStar.value);
  if (pendingRatingResto) {
    if (!pendingRatingResto.ratings) pendingRatingResto.ratings = [];
    pendingRatingResto.ratings.push(restoVal);
    logAdminEvent("CLIENT", `Note de ${restoVal}/5 au restaurant ${pendingRatingResto.name}`);
    saveRestaurant(pendingRatingResto);
  }
  if (pendingRatingLiv && livStar) {
    const livVal = parseInt(livStar.value);
    if (!pendingRatingLiv.ratings) pendingRatingLiv.ratings = [];
    pendingRatingLiv.ratings.push(livVal);
    logAdminEvent("CLIENT", `Note de ${livVal}/5 au livreur ${pendingRatingLiv.name}`);
    saveLivreur(pendingRatingLiv);
  }
  setNotif("🎉 Merci pour vos notes !");
  if (pendingRatingResto && pendingOrderForRating) {
    const r = pendingRatingResto;
    const idx = r.orders.findIndex(o => o.id === pendingOrderForRating.id);
    if (idx !== -1) { r.orders.splice(idx, 1); saveRestaurant(r); }
  }
  pendingRatingResto = null; pendingRatingLiv = null; pendingOrderForRating = null;
  closeRatingModal();
}

function closeRatingModal() {
  document.getElementById('rating-modal').style.display = 'none';
  if (pendingRatingResto && pendingOrderForRating) {
    const r = pendingRatingResto;
    const idx = r.orders.findIndex(o => o.id === pendingOrderForRating.id);
    if (idx !== -1) { r.orders.splice(idx, 1); saveRestaurant(r); }
    pendingRatingResto = null; pendingRatingLiv = null; pendingOrderForRating = null;
  }
  processRatingQueue();
}
